name: ci

on:
  push:
    paths:
      - 'k8s/**'
      - 'charts/**'
      - '.github/workflows/ci.yaml'
      - 'Dockerfile'
      - 'src/**'
      - 'runnerdeployment.yaml'
    branches:
      - main

jobs:
  docker:
    runs-on: self-hosted
    environment: Ephemeral1
    steps:
      -
        name: Set image tag
        id: image-tag
        run: echo "tag=${GITHUB_SHA::6}" >> "$GITHUB_OUTPUT"
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sayansarkar1992/simple-flask-app:${{ steps.image-tag.outputs.tag }}
